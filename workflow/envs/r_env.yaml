name: r_env
channels:
  - conda-forge
  - bioconda
  - r
  - defaults
dependencies:
  # R Core and System requirements
  - r-base=4.3
  - tk

  # CRAN Packages
  - r-ggplot2
  - r-data.table
  - r-readxl
  - r-circlize
  - r-viridislite
  - r-vegan
  - r-arrow
  - r-ggrepel
  - r-patchwork
  - r-factoextra
  - r-factominer
  - r-compositions
  - r-missmda
  - r-purrr
  - r-readr

  # Bioconductor Packages
  - bioconductor-deseq2
  - bioconductor-phyloseq
  - bioconductor-complexheatmap