# ==========================================================================
# Pipeline MicrobExplorer
# Configuration file (YAML format)
# Author: "Yann Le Bihan"
# Date: "2025-12-01"
# Link : https://github.com/Yann-LBH/MicrobExplorer
#
# extensions used for input:
#  reads: ".txt"       #".kaijuNR"
#  contigs: ".txt"       #".tsv"
#  bakta: ".txt"       #".gff3"
#  plot: ".pdf"
# ==========================================================================

# ==========================================================================
# DATA PATH
# ==========================================================================
samples_file: "config/samples.tsv"

input_path:
  data_raw: "data/raw/"
  metadata: "data/metadata/metadata.csv"
  taxonomy_ncbi: 
    zip_url: "https://ftp.ncbi.nlm.nih.gov/pub/taxonomy/new_taxdump/new_taxdump.zip"
    dmp_name: "data/taxonomy_ncbi/new_taxdump.zip/rankedlineage.dmp"
    local_path: "data/taxonomy_ncbi/taxaname.csv"
  taxonomy_megahit: "data/taxonomy_megahit/taxaname.txt"
  pathway_bakta: 
    url : "https://rest.kegg.jp/get/br:ko00001"
    local_path: "data/pathway_bakta/pathway.tsv"
  physico_params: "data/physico_parameters/parameters.xlsx"
  gff3: "data/gff3"

output_path:
  treatment: "results/treatment/"
  plots: "results/plots/"
  rds: "results/rds/"
  parquet: "results/parquet/"
  qc: "results/qc/"
# ==========================================================================

# ==========================================================================
# PIPELINE CONFIGURATION
# ==========================================================================

# Run analysis and plots

# --- Modules actifs ---
run_taxonomy:     True
run_reads:        True
run_contigs:      True
run_kegg:         True
run_plots:        True
run_deseq2:       True
run_phyloseq:     True
run_physico:      True
run_qc:           True

# Data types used for each plot/analysis type

datatypes:
  phyloseq: ["contigs"]
  deseq2: ["contigs", "kegg"]
  stackedbarplot:
    standard:
      pathway:   ["kegg"]
      taxonomy:  ["reads", "contigs"]
      organisms: ["reads", "contigs"]
    deseq2:    ["contigs", "kegg"]
  heatmap: ["reads", "contigs"]
  volcano: ["contigs", "kegg"]
  qc: ["reads", "contigs"]


# General parameters

deseq_label: "Genus"  # Options possibles : "Contig_ID", "Phylum", "Genus", etc.

# DESeq2 contrasts to generate
# Change this list to use only the contrasts you need
deseq2_contrasts: ["ref", "date", "combo"]  # Options: "ref", "date", "combo"

# Reads parameters
reads:
  count_threshold: 10
  top_n: 50
  noise: 
    - "root"
    - "cellular organisms"
    - "unclassified"
    - "Bacteriophage sp."
    - "Duplodnaviria"
    - "environmental Halophage eHP-30"
    - "Methanobacterium virus PhiF1"
    - "Prokaryotic dsDNA virus sp."
    - "Riboviria"
    - "uncultured virus"
    - "Virus NIOZ-UU157"
    - "Viruses"

# Contigs parameters
contigs:
  length_threshold: 3000
  abundance_threshold: 100
  rpkm_threshold: 0.5

# Kegg parameters
kegg:
  pvalue_threshold : 0.05
  lfc_treshold : 1.3

# Graphic parameters

#utile ?
taxonomic_levels:
  - "Phylum"
  - "Class"
  - "Order"
  - "Family"
  - "Genus"
  - "Species"

pathway_levels:
  - "level_1"
  - "level_2"
  - "level_3"
  - "gene_description"

plots:
# Global
  shared:
    theme: "theme_minimal"
    palette: "Turbo"
    width: 10
    height: 8
    title:
      size: 12
    legend:
      size: 10
    axes:
      size: 10

# Plots
  barplot:
    top_n: 19
    taxon_rank: "Class"

  stackedbarplot:
    title: "Top 10 taxons differentially abundant"
    subtitle: "DESeq2 results"
    top_n: 10
    taxon_rank: "Class"

  pca:
    color_by: "condition"
    point_size: 2
    top_n: 10
    dim_x: 1
    dim_y: 2
    physico_cols: "pH"

  heatmap:
    top_n: 50
    clust_method: brad
    #cluster_rows: True

  volcano:
    pvalue_threshold : 0.05
    lfc_treshold : 1.3
