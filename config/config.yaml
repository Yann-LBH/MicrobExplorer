# ==========================================================================
# Pipeline MicrobExplorer
# Configuration file (YAML format)
# Author: "Yann Le Bihan"
# Date: "2025-12-01"
# Link : https://github.com/Yann-LBH/MicrobExplorer
#
# extensions used for input:
#  reads: ".txt"       #".kaijuNR"
#  contigs: ".txt"       #".tsv"
#  bakta: ".txt"       #".gff3"
#  plot: ".pdf"
# ==========================================================================

# ==========================================================================
# DATA PATH
# ==========================================================================
samples_file: "config/samples.tsv"

input_path:
  data_raw: 
    reads: "data/raw/reads/"
    contigs: "data/raw/contigs/"
    kegg: "data/raw/kegg/"
  metadata: "data/metadata/metadata.xlsx"
  taxonomy_ncbi: 
    zip_url: "https://ftp.ncbi.nlm.nih.gov/pub/taxonomy/new_taxdump/new_taxdump.zip"
    dmp_name: "data/taxonomy_ncbi/new_taxdump.zip/rankedlineage.dmp"
    local_path: "data/taxonomy_ncbi/taxaname.tsv"
  taxonomy_megahit: "data/taxonomy_megahit/contigs_coassembly-taxNames.tsv"
  pathway_bakta: 
    url : "https://rest.kegg.jp/get/br:ko00001"
    local_path: "data/pathway_bakta/pathway.tsv"
  physico_params: "data/physico_parameters/parameters.xlsx"
  gff3: "data/gff3"

output_path:
  treatment: "results/treatment/"
  plots: "results/plots/"
  rds: "results/rds/"
  parquet: "results/parquet/"
  qc: "results/qc/"
# ==========================================================================

# ==========================================================================
# PIPELINE CONFIGURATION
# ==========================================================================

# Run analysis and plots

# --- Modules actifs ---
run_taxonomy:     True
run_reads:        True
run_contigs:      True
run_kegg:         False
run_plots:        True
run_deseq2:       True
run_phyloseq:     True
run_physico:      True
run_qc:           True

# Data types used for each plot/analysis type

datatypes:
  phyloseq: ["reads","contigs","kegg"]
  deseq2: ["contigs", "kegg"]
  stackedbarplot:
    standard:
      pathway:   ["kegg"]
      taxonomy:  ["reads", "contigs"]
      organisms: ["reads", "contigs"]
    deseq2:    ["contigs", "kegg"]
  heatmap: ["reads", "contigs", "kegg"]
  volcano: ["contigs", "kegg"]
  qc: ["reads", "contigs", "kegg"]


# General parameters

# Analysis parameters

# Abundance columns
phyloseq:
    reads: "CPM"
    contigs: "RPKM"
    kegg: "standardization"

# DESeq2 contrasts to generate
# Change this list to use only the contrasts you need
deseq2:
  contrasts: ["ref", "date", "combo"]  # Options: "ref", "date", "combo"
  ref: "TD1"

# Reads parameters
reads:
  count_threshold: 10
  top_n: 50
  noise: 
    - "root"
    - "cellular organisms"
    - "unclassified"
    - "Bacteriophage sp."
    - "Duplodnaviria"
    - "environmental Halophage eHP-30"
    - "Methanobacterium virus PhiF1"
    - "Prokaryotic dsDNA virus sp."
    - "Riboviria"
    - "uncultured virus"
    - "Virus NIOZ-UU157"
    - "Viruses"

# Contigs parameters
contigs:
  length_threshold: 3000
  abundance_threshold: 100
  rpkm_threshold: 0.5

# Kegg parameters
kegg:
  pvalue_threshold : 0.05
  lfc_treshold : 1.3

# Graphic parameters

plots:
# Global
  shared:
    theme: "theme_minimal"
    palette: "Turbo"
    width: 10
    height: 8
    title:
      size: 12
    legend:
      size: 10
    axes:
      size: 10

# Plots
  barplot:
    top_n: 19
    taxon_rank: "genus"

  stackedbarplot:
    title: "Top 10 taxons differentially abundant"
    subtitle: "DESeq2 results"
    top_n: 10
    target_rank:: "genus"
    taxon_rank: "genus" #eg : "phylum", class", "order", "family", "genus", "species"
    pathway_level: "level_3" #eg : "level_1", "level_2", "level_3", "gene_description"

  pca:
    color_by: "condition"
    point_size: 2
    top_n: 10
    dim_x: 1
    dim_y: 2
    physico_cols: "pH"

  heatmap:
    top_n: 50
    clust_method: brad
    #cluster_rows: True

  volcano:
    pvalue_threshold : 0.05
    lfc_treshold : 1.3
# ==========================================================================